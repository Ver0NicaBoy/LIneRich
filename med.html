<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>จัดการยา</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
    *{
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    margin:0;
    background:#f4f6f8;
    padding-bottom:90px;
}

.header{
    background:#06C755;
    color:white;
    padding:25px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

.header h2{
    margin:0;
}

.container{
    max-width:420px;
    margin:auto;
    padding:15px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:18px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.section-title{
    font-size:22px;
    font-weight:bold;
    color:#333;
    margin-bottom:15px;
}

.tip-item{
    display:flex;
    gap:15px;
    align-items:flex-start;
    padding:12px 0;
}

.tip-icon{
    font-size:24px;
}

.tip-title{
    font-weight:bold;
    color:#333;
    margin-bottom:3px;
}

.tip-desc{
    font-size:13px;
    color:#666;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    color:#555;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:14px;
    background:#fff;
}

textarea{
    resize:none;
    height:90px;
}

.row{
    display:flex;
    gap:10px;
}

.row .form-group{
    flex:1;
}

.btn-add{
    width:100%;
    border:none;
    background:#06C755;
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.btn-add:hover{
    opacity:.9;
}

.list-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.list-header h3{
    margin:0;
    color:#333;
}

.clear-btn{
    color:#ff5252;
    font-size:13px;
    cursor:pointer;
    font-weight:bold;
}

.medicine-item{
    border:1px solid #eee;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    position:relative;
}

.medicine-name{
    font-size:18px;
    font-weight:bold;
    color:#333;
}

.medicine-time{
    color:#06C755;
    font-size:13px;
    margin-top:5px;
}

.medicine-detail{
    margin-top:8px;
    font-size:13px;
    color:#666;
    line-height:1.8;
}

.delete-btn{
    position:absolute;
    right:12px;
    top:12px;
    color:#ff5252;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:8px 0;
    box-shadow:0 -2px 10px rgba(0,0,0,.08);
    z-index:1000;
}

.nav-item{
    flex:1;
    text-align:center;
    text-decoration:none;
    color:#999;
    padding:8px 0;
}

.nav-item i{
    display:block;
    font-size:18px;
    margin-bottom:4px;
}

.nav-item span{
    font-size:10px;
}

.nav-item.active{
    color:#06C755;
}

.nav-item.active i{
    color:#06C755;
}
    </style>
</head>

<body>

<div class="header">
    <h2>💊 จัดการยา</h2>
</div>

<div class="container">
