<script>
const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbytSdgYUH2PnKiqFwMT89QQFcPFTlfOhWtMMHFrpwgSoqFFZoUyHaffIpBW4Yz36lOG/exec";

async function main(){
  await liff.init({ liffId });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  const userId = profile.userId;

  const response = await fetch(`${scriptURL}?lineId=${userId}`);
  const result = await response.json();

  if(result.status === "found"){
    document.getElementById("name").innerText = result.name;
    document.getElementById("phone").innerText = result.phone;
  }
  else{
    window.location.href = "index.html";
  }
}

main();
</script>
