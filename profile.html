<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>โปรไฟล์</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h2{
  margin-bottom:10px;
}

p{
  font-size:16px;
}
</style>
</head>

<body>

<div class="card">
  <h2>ข้อมูลสมาชิก</h2>
  <p><b>ชื่อ:</b> <span id="name"></span></p>
  <p><b>เบอร์:</b> <span id="phone"></span></p>
</div>

<script>
const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbzLf4AVlo1iBDjBy5jDKI9K_HYeabjoEVkx7m5Ew6TG8pkLenMG3VcYcX5r9rYXqLKf/exec";

async function main(){

  await liff.init({ liffId });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  const userId = profile.userId;

  const formData = new URLSearchParams();
  formData.append("action","checkUser");
  formData.append("lineId",userId);

  const response = await fetch(scriptURL,{
    method:"POST",
    body:formData
  });

  const result = await response.json();

  if(result.status === "found"){
    document.getElementById("name").innerText = result.name;
    document.getElementById("phone").innerText = result.phone;
  }else{
    window.location.href = "./index.html";
  }

}

main();
</script>

</body>
</html>
