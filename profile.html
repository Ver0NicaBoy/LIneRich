<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>โปรไฟล์</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  height:50px;
  padding:12px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  background:#06C755;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

#status{
  margin-top:10px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>ข้อมูลสมาชิก</h2>

  <p>ชื่อ</p>
  <input type="text" id="name">

  <p>เบอร์โทร</p>
  <input type="tel" id="phone">

  <button onclick="save()">บันทึกข้อมูล</button>

  <div id="status"></div>
</div>

<script>

const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbxktMC7Tu7LrpTKhhQwe_2BqP-6bDSGPKVxzR_rS7nnFDcTxcjRdewCJIQ7dgwIEUcZ/exec";

let userId = "";

async function main(){

  await liff.init({ liffId });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  const formData = new URLSearchParams();
  formData.append("action","checkUser");
  formData.append("lineId",userId);

  const response = await fetch(scriptURL,{
    method:"POST",
    body:formData
  });

  const result = await response.json();

  if(result.status === "found"){
    document.getElementById("name").value = result.name;
    document.getElementById("phone").value = result.phone;
  }else{
    window.location.href = "./index.html";
  }

}

main();


async function save(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const status = document.getElementById("status");

  const formData = new URLSearchParams();
  formData.append("action","updateUser");
  formData.append("lineId",userId);
  formData.append("name",name);
  formData.append("phone",phone);

  const response = await fetch(scriptURL,{
    method:"POST",
    body:formData
  });

  const result = await response.json();

  if(result.status === "updated"){
    status.innerText = "บันทึกข้อมูลสำเร็จ ✅";
  }else{
    status.innerText = "เกิดข้อผิดพลาด ❌";
  }

}

</script>

</body>
</html>

</body>
</html>
