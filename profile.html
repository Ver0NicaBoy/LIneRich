<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>โปรไฟล์</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input{
  width:100%;
  height:45px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  height:45px;
  border:none;
  border-radius:10px;
  background:#06C755;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.back{
  background:#999;
}

#editBox{
  display:none;
}
</style>
</head>

<body>

<div class="card">

<h2>ข้อมูลสมาชิก</h2>

<p><b>ชื่อ:</b> <span id="name"></span></p>
<p><b>เบอร์:</b> <span id="phone"></span></p>
<p><b>น้ำหนัก:</b> <span id="weight"></span> kg</p>
<p><b>ส่วนสูง:</b> <span id="height"></span> cm</p>

<button onclick="showEdit()">แก้ไขข้อมูล</button>

<button class="back" onclick="goDashboard()">⬅ กลับหน้า Dashboard</button>

<div id="editBox">

<input type="text" id="editName" placeholder="ชื่อ">
<input type="tel" id="editPhone" placeholder="เบอร์โทร">
<input type="number" id="editWeight" placeholder="น้ำหนัก (kg)">
<input type="number" id="editHeight" placeholder="ส่วนสูง (cm)">

<button onclick="save()">บันทึกข้อมูล</button>

</div>

</div>

<script>

const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbzd02nojjAkTlmFAjFJhxEIIiJBCWWWSutHXerUPEGFHQEn41-NDpOFka3kPgL-QkR8/exec";

let userId = "";

async function main(){

  await liff.init({ liffId });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  const formData = new URLSearchParams();
  formData.append("action","checkUser");
  formData.append("lineId",userId);

  const response = await fetch(scriptURL,{
    method:"POST",
    body:formData
  });

  const result = await response.json();

  if(result.status === "found"){

    document.getElementById("name").innerText = result.name;
    document.getElementById("phone").innerText = result.phone;
    document.getElementById("weight").innerText = result.weight;
    document.getElementById("height").innerText = result.height;

    document.getElementById("editName").value = result.name;
    document.getElementById("editPhone").value = result.phone;
    document.getElementById("editWeight").value = result.weight;
    document.getElementById("editHeight").value = result.height;

  }else{
    window.location.href = "./index.html";
  }

}

main();

function showEdit(){
  document.getElementById("editBox").style.display = "block";
}

function goDashboard(){
  window.location.href="./dashboard.html";
}

async function save(){

  const name = document.getElementById("editName").value;
  const phone = document.getElementById("editPhone").value;
  const weight = document.getElementById("editWeight").value;
  const height = document.getElementById("editHeight").value;

  const formData = new URLSearchParams();
  formData.append("action","updateUser");
  formData.append("lineId",userId);
  formData.append("name",name);
  formData.append("phone",phone);
  formData.append("weight",weight);
  formData.append("height",height);

  const response = await fetch(scriptURL,{
    method:"POST",
    body:formData
  });

  const result = await response.json();

  if(result.status === "updated"){
    alert("บันทึกสำเร็จ");
    location.reload();
  }

}

</script>

</body>
</html>
