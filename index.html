<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก</title>
<script src="https://script.google.com/u/0/home/projects/14hB9fHSwIc7QyCMuWschA09WghN5cuJzrtfrbI23zYgAy8xJTW-FsrsV/edit"></script>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<form id="form">
  <input type="text" id="name" placeholder="ชื่อ-นามสกุล" required><br><br>
  <input type="tel" id="phone" placeholder="เบอร์โทร" required><br><br>
  <button type="submit">สมัครสมาชิก</button>
</form>

<script>
const liffId = "2009309078-VfLCE4sr";
const scriptURL = "ใส่ URL Apps Script ของคุณ";

let profile = null;
const submitBtn = document.querySelector("button");

submitBtn.disabled = true; // ปิดปุ่มก่อน

async function initLIFF() {
  await liff.init({ liffId });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  profile = await liff.getProfile();

  // เปิดปุ่มเมื่อโหลดเสร็จ
  submitBtn.disabled = false;
}

initLIFF();

document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    lineId: profile.userId,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  };

  await fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("สมัครสมาชิกสำเร็จ 🎉");
});
</script>
</body>
</html>
