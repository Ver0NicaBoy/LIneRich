<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สมัครสมาชิก</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
*{
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  margin:0;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  height:50px;
  padding:12px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  height:52px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#06C755;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>สมัครสมาชิก</h2>

  <input type="text" id="name" placeholder="ชื่อ - นามสกุล">
  <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์">

  <button id="btn">สมัครสมาชิก</button>

  <div id="status"></div>
</div>

<script>
const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbxktMC7Tu7LrpTKhhQwe_2BqP-6bDSGPKVxzR_rS7nnFDcTxcjRdewCJIQ7dgwIEUcZ/exec";

let userId = "";

async function main(){
  try{
    await liff.init({ liffId });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    // 🔍 เช็คสมาชิก
    const formData = new URLSearchParams();
    formData.append("action", "checkUser");
    formData.append("lineId", userId);

    const response = await fetch(scriptURL,{
      method:"POST",
      body: formData
    });

    const result = await response.json();

    if(result.status === "found"){
      window.location.href = "./profile.html";
      return;
    }

  }catch(err){
    console.log("CHECK ERROR:", err);
  }
}

main();


// ================== สมัครสมาชิก ==================
document.getElementById("btn").addEventListener("click", async ()=>{

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const status = document.getElementById("status");
  const btn = document.getElementById("btn");

  if(!name || !phone){
    status.innerText = "กรอกข้อมูลให้ครบ ❗";
    return;
  }

  btn.disabled = true;
  status.innerText = "กำลังบันทึก...";

  try{

    const formData = new URLSearchParams();
    formData.append("action", "register");
    formData.append("lineId", userId);
    formData.append("name", name);
    formData.append("phone", phone);

    const response = await fetch(scriptURL,{
      method:"POST",
      body: formData
    });

    const result = await response.json();

    if(result.status === "success"){
      status.innerText = "สมัครสำเร็จ 🎉";
      setTimeout(()=>{
        window.location.href = "./profile.html";
      },1000);
    }
    else if(result.status === "duplicate"){
      window.location.href = "./profile.html";
    }
    else{
      status.innerText = "เกิดข้อผิดพลาด";
      btn.disabled = false;
    }

  }catch(err){
    console.log("REGISTER ERROR:", err);
    status.innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ❌";
    btn.disabled = false;
  }

});
</script>

</body>
</html>
