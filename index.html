<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สมัครสมาชิก</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
*{box-sizing:border-box;font-family:sans-serif;}
body{
  margin:0;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
h2{text-align:center;margin-bottom:20px;}
input{
  width:100%;
  height:50px;
  padding:12px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
  outline: none;
}
input:focus {
  border-color: #06C755;
}
/* 📅 Style สำหรับข้อความแจ้งเตือนวันเกิด */
.date-label {
  display: block;
  font-size: 14px;
  color: #555;
  margin-bottom: 6px;
  font-weight: bold;
  text-align: left;
  padding-left: 4px;
}
button{
  width:100%;
  height:52px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#06C755;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top: 5px;
}
button:disabled {
  background:#a5d6a7;
}
#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

/* 📌 Style สำหรับหน้า Loading รอ 3 วินาที */
#loading-overlay {
  display: none; /* ซ่อนไว้ก่อน */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #ffffff;
  z-index: 9999;
  justify-content: center;
  align-items: center;
}
#loading-overlay img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* ให้รูปภาพเต็มจอพอดี */
}
</style>
</head>

<body>

<div id="loading-overlay">
  <img src="loadding.jpg" alt="Loading">
</div>

<div class="container">
  <h2>สมัครสมาชิก</h2>

  <input type="text" id="name" placeholder="ชื่อ - นามสกุล">
  <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์">

  <input type="number" step="0.1" id="weight" placeholder="น้ำหนักปัจจุบัน (kg)">
  
  <input type="number" step="0.1" id="targetWeight" placeholder="น้ำหนักเป้าหมาย (kg)">
  
  <input type="number" step="0.1" id="height" placeholder="ส่วนสูง (cm)">

  <input type="text" id="medicalCondition" placeholder="โรคประจำตัว (ถ้าไม่มีใส่ -)">

  <label class="date-label" for="birthdate">📅 วัน/เดือน/ปี เกิด</label>
  <input type="date" id="birthdate">

  <button id="Btn">สมัครสมาชิก</button>
  <div id="status"></div>
</div>

<script>

const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbzcv5NvYYwmQCjp9rLQVuMxvxbrrZHE-qv8HsghzAuQYq2eTiRKIEugVPc2UxuTptlx/exec";

let userId = "";

// ✅ ฟังก์ชันสำหรับโชว์รูป 3 วินาทีแล้วไปหน้า Dashboard
function showLoadingAndRedirect() {
  document.getElementById('loading-overlay').style.display = 'flex';
  setTimeout(() => {
    window.location.href = "./dashboard.html";
  }, 3000); // 3000 มิลลิวินาที = 3 วินาที
}

// ✅ ฟังก์ชันคำนวณอายุ
function calculateAge(birthdate){
  const today = new Date();
  const birth = new Date(birthdate);

  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();

  if(m < 0 || (m === 0 && today.getDate() < birth.getDate())){
    age--;
  }

  return age;
}

async function main(){
  try{
    await liff.init({ liffId });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    const formData = new URLSearchParams();
    formData.append("action","checkUser");
    formData.append("lineId",userId);

    const response = await fetch(scriptURL,{
      method:"POST",
      body:formData
    });

    const result = await response.json();

    if(result.status === "found"){
      // 📌 ถ้าเจอว่าเคยสมัครแล้ว ให้โชว์รูป 3 วินาทีแล้วค่อยไป
      showLoadingAndRedirect();
      return;
    }

  }catch(err){
    console.log("CHECK ERROR:",err);
  }
}

main();


// ================= สมัครสมาชิก =================

document.getElementById("Btn").addEventListener("click", async ()=>{

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const weight = document.getElementById("weight").value.trim();
  const targetWeight = document.getElementById("targetWeight").value.trim(); // รับค่าน้ำหนักเป้าหมาย
  const height = document.getElementById("height").value.trim();
  const medicalCondition = document.getElementById("medicalCondition").value.trim(); // รับค่าโรคประจำตัว
  const birthdate = document.getElementById("birthdate").value;

  const status = document.getElementById("status");
  const btn = document.getElementById("Btn"); 

  // บังคับกรอกข้อมูล (โรคประจำตัวปล่อยว่างได้)
  if(!name || !phone || !weight || !targetWeight || !height || !birthdate){
    status.innerText = "กรอกข้อมูลให้ครบ ❗";
    return;
  }

  // ✅ ถ้าไม่ได้กรอกโรคประจำตัวมา ให้เป็น "-" แทน
  const finalMedical = medicalCondition || "-";

  // ✅ คำนวณอายุ
  const age = calculateAge(birthdate);

  btn.disabled = true;
  status.innerText = "กำลังบันทึก...";

  try{

    const formData = new URLSearchParams();
    formData.append("action","register");
    formData.append("lineId",userId);
    formData.append("name",name);
    formData.append("phone", "'" + phone); 
    formData.append("weight",weight);
    formData.append("targetWeight", targetWeight);       // ✅ ส่งน้ำหนักเป้าหมาย
    formData.append("height",height);
    formData.append("medicalCondition", finalMedical);   // ✅ ส่งโรคประจำตัว
    formData.append("birthdate",birthdate); 
    formData.append("age",age);              

    const response = await fetch(scriptURL,{
      method:"POST",
      body:formData
    });

    const result = await response.json();
    console.log(result); // 🔍 debug

    if(result.status === "success"){
      status.innerText = "สมัครสำเร็จ 🎉";
      // 📌 ถ้าสมัครสำเร็จ ให้โชว์รูป 3 วินาทีแล้วค่อยไป
      showLoadingAndRedirect();

    }
    else if(result.status === "duplicate"){
      // 📌 ถ้าขึ้น duplicate ให้โชว์รูป 3 วินาทีแล้วค่อยไป
      showLoadingAndRedirect();
    }
    else{
      status.innerText = "ERROR: " + result.status;
      btn.disabled = false;
    }

  }catch(err){
    console.log("REGISTER ERROR:",err);
    status.innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ❌";
    btn.disabled = false;
  }

});

</script>

</body>
</html>
