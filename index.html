<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สมัครสมาชิก</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
*{
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  margin:0;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.input-group{
  margin-bottom:15px;
}

input{
  width:100%;
  height:50px;
  padding:12px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  height:52px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#06C755;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

@media (min-width:768px){
  body{
    background:#eaeaea;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>สมัครสมาชิก</h2>

  <div class="input-group">
    <input type="text" id="name" placeholder="ชื่อ - นามสกุล">
  </div>

  <div class="input-group">
    <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์">
  </div>

  <button id="btn">สมัครสมาชิก</button>

  <div id="status"></div>
</div>

<script>
const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbyvq5NISyedW-aBRQBMffpxelFqSF8UXlPJIlUazxazk11IOq6KbfnW7kbORJGYu60/exec";

async function main(){
  await liff.init({ liffId });
  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }
  const profile = await liff.getProfile();
  window.userId = profile.userId;
}
main();

document.getElementById("btn").addEventListener("click", async ()=>{
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const status = document.getElementById("status");

  if(!name || !phone){
    status.innerText = "กรอกข้อมูลให้ครบ";
    return;
  }

  status.innerText = "กำลังบันทึก...";

  await fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      lineId:window.userId,
      name:name,
      phone:phone
    })
  });

  status.innerText = "บันทึกเรียบร้อย ✔";
  setTimeout(()=>liff.closeWindow(),1500);
});
</script>

</body>
</html>
