<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>สมัครสมาชิก</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:20px;">

<h2>สมัครสมาชิก</h2>

<input type="text" id="name" placeholder="ชื่อ"
style="width:80%;padding:10px;margin:8px;"><br>

<input type="text" id="phone" placeholder="เบอร์โทร"
style="width:80%;padding:10px;margin:8px;"><br>

<button id="btn">สมัครสมาชิก</button>

<p id="status"></p>

<script>

const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbyvq5NISyedW-aBRQBMffpxelFqSF8UXlPJIlUazxazk11IOq6KbfnW7kbORJGYu60/exec";

async function main(){
  await liff.init({ liffId });
  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }
  const profile = await liff.getProfile();
  window.userId = profile.userId;
}

main();

document.getElementById("btn").addEventListener("click", async ()=>{

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const status = document.getElementById("status");

  if(!name || !phone){
    status.innerText = "กรอกข้อมูลให้ครบ";
    return;
  }

  status.innerText = "กำลังบันทึก...";

  await fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      lineId:window.userId,
      name:name,
      phone:phone
    })
  });

  status.innerText = "ส่งข้อมูลแล้ว ✔";
  setTimeout(()=>liff.closeWindow(),1500);

});

</script>
</body>
</html>
