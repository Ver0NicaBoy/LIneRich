<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<form id="form">
  <input type="text" id="name" placeholder="ชื่อ-นามสกุล" required><br><br>
  <input type="tel" id="phone" placeholder="เบอร์โทร" required><br><br>
  <button type="submit">สมัครสมาชิก</button>
</form>

<script>
const liffId = "2009309078-VfLCE4sr";

let userProfile = null;

async function main(){
  await liff.init({ liffId: liffId });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  userProfile = await liff.getProfile();
  console.log("LINE ID:", userProfile.userId);
}

main();

document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  if (!userProfile) {
    alert("กำลังโหลดข้อมูล LINE กรุณาลองใหม่");
    return;
  }

  const data = {
    lineId: userProfile.userId,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  };

  console.log(data);

  alert("สมัครสมาชิกสำเร็จ\nLINE ID: " + data.lineId);
});
</script>
</body>
</html>
