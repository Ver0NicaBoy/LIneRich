<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.card{
  background:#fff;
  width:320px;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

#status{
  margin-top:10px;
  font-size:13px;
  color:#555;
}
</style>
</head>

<body>

<div class="card">
  <h2>สมัครสมาชิก</h2>
  <div id="status">กำลังเชื่อมต่อ LINE...</div>

  <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
  <input type="text" id="phone" placeholder="เบอร์โทร">

  <button id="submitBtn" onclick="submitForm()">สมัครสมาชิก</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycby_fWpLgrR_kdmsLVMmyxiIlmp6jznJ3wYnC131hO-gel9TNwgI3V7vlLuf3BwB9QTQ/exec";

let userId = null;

async function initLIFF(){
  const statusText = document.getElementById("status");

  try{
    await liff.init({ liffId });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    statusText.innerText = "เชื่อมต่อสำเร็จ: " + profile.displayName;

  }catch(err){
    statusText.innerText = "Error: " + err.message;
    console.log(err);
  }
}

async function submitForm(){

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const statusText = document.getElementById("status");
  const btn = document.getElementById("submitBtn");

  if(!name || !phone){
    statusText.innerText = "กรุณากรอกข้อมูลให้ครบ";
    return;
  }

  btn.disabled = true;
  statusText.innerText = "กำลังบันทึกข้อมูล...";

  try{

    const response = await fetch(scriptURL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        lineId:userId,
        name:name,
        phone:phone
      })
    });

    const result = await response.json();

    if(result.status === "success"){
      statusText.innerText = "สมัครสมาชิกสำเร็จ 🎉";
      btn.innerText = "สำเร็จแล้ว";
    }else{
      statusText.innerText = "เกิดข้อผิดพลาด";
      btn.disabled = false;
    }

  }catch(err){
    statusText.innerText = "Error: " + err.message;
    btn.disabled = false;
  }
}

initLIFF();
</script>

</body>
</html>
