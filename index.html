<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สมัครสมาชิก</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
*{box-sizing:border-box;font-family:sans-serif;}
body{
  margin:0;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:100%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
h2{text-align:center;margin-bottom:20px;}
input{
  width:100%;
  height:50px;
  padding:12px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
  outline: none;
}
input:focus {
  border-color: #06C755;
}
/* 📅 เพิ่ม Style สำหรับข้อความแจ้งเตือนวันเกิด */
.date-label {
  display: block;
  font-size: 14px;
  color: #555;
  margin-bottom: 6px;
  font-weight: bold;
  text-align: left;
  padding-left: 4px;
}
button{
  width:100%;
  height:52px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#06C755;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top: 5px;
}
button:disabled {
  background:#a5d6a7;
}
#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>สมัครสมาชิก</h2>

  <input type="text" id="name" placeholder="ชื่อ - นามสกุล">
  <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์">

  <input type="number" step="0.1" id="weight" placeholder="น้ำหนัก (kg)">
  <input type="number" step="0.1" id="height" placeholder="ส่วนสูง (cm)">

  <label class="date-label" for="birthdate">📅 วัน/เดือน/ปี เกิด</label>
  <input type="date" id="birthdate">

  <button id="Btn">สมัครสมาชิก</button>
  <div id="status"></div>
</div>

<script>

const liffId = "2009309078-VfLCE4sr";
const scriptURL = "https://script.google.com/macros/s/AKfycbx4w0db-eykxa-GZv5PfWtLPNlRdb4KMXUMP5gQ9xr4cFVQTlMAAdyBOd9QFhjKzLaI/exec";

let userId = "";

// ✅ ฟังก์ชันคำนวณอายุ
function calculateAge(birthdate){
  const today = new Date();
  const birth = new Date(birthdate);

  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();

  if(m < 0 || (m === 0 && today.getDate() < birth.getDate())){
    age--;
  }

  return age;
}

async function main(){
  try{
    await liff.init({ liffId });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    const formData = new URLSearchParams();
    formData.append("action","checkUser");
    formData.append("lineId",userId);

    const response = await fetch(scriptURL,{
      method:"POST",
      body:formData
    });

    const result = await response.json();

    if(result.status === "found"){
      window.location.href = "./dashboard.html";
      return;
    }

  }catch(err){
    console.log("CHECK ERROR:",err);
  }
}

main();


// ================= สมัครสมาชิก =================

document.getElementById("Btn").addEventListener("click", async ()=>{

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const weight = document.getElementById("weight").value.trim();
  const height = document.getElementById("height").value.trim();
  const birthdate = document.getElementById("birthdate").value;

  const status = document.getElementById("status");
  const btn = document.getElementById("Btn"); 

  if(!name || !phone || !weight || !height || !birthdate){
    status.innerText = "กรอกข้อมูลให้ครบ ❗";
    return;
  }

  // ✅ คำนวณอายุ
  const age = calculateAge(birthdate);

  btn.disabled = true;
  status.innerText = "กำลังบันทึก...";

  try{

    const formData = new URLSearchParams();
    formData.append("action","register");
    formData.append("lineId",userId);
    formData.append("name",name);
    formData.append("phone", "'" + phone); 
    formData.append("weight",weight);
    formData.append("height",height);
    formData.append("birthdate",birthdate); 
    formData.append("age",age);              

    const response = await fetch(scriptURL,{
      method:"POST",
      body:formData
    });

    const result = await response.json();
    console.log(result); // 🔍 debug

    if(result.status === "success"){
      status.innerText = "สมัครสำเร็จ 🎉";

      setTimeout(()=>{
        window.location.href = "./dashboard.html";
      },1000);

    }
    else if(result.status === "duplicate"){
      window.location.href = "./dashboard.html";
    }
    else{
      status.innerText = "ERROR: " + result.status;
      btn.disabled = false;
    }

  }catch(err){
    console.log("REGISTER ERROR:",err);
    status.innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ❌";
    btn.disabled = false;
  }

});

</script>

</body>
</html>
