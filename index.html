<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  width:320px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  background:#06C755;
  border:none;
  color:white;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="card">
<h2>สมัครสมาชิก</h2>

<form>
<input type="text" placeholder="ชื่อ-นามสกุล" required>
<input type="tel" placeholder="เบอร์โทร" required>
<input type="email" placeholder="อีเมล" required>

<button type="submit">สมัครสมาชิก</button>
</form>

</div>

</body>
</html>
